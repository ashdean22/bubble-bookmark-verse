
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- Primary Meta Tags -->
    <title>BubbleLink - Transform Your Bookmarks Into Beautiful Floating Bubbles</title>
    <meta name="title" content="BubbleLink - Transform Your Bookmarks Into Beautiful Floating Bubbles" />
    <meta name="description" content="Save and organize your favorite websites as stunning floating bubbles in space. Click any bubble to instantly visit your bookmarked sites. Beautiful, intuitive, and magical bookmark management." />
    <meta name="keywords" content="bookmarks, bookmark manager, visual bookmarks, floating bubbles, website organizer, browser bookmarks, productivity tool, visual bookmarking" />
    <meta name="author" content="BubbleLink" />
    <meta name="robots" content="index, follow" />

    <!-- Security policies are handled by hosting headers so the Lovable preview iframe can boot reliably. -->
    <!-- Control referrer exposure -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <!-- Disable browser features not needed -->
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=()" />
    <meta name="theme-color" content="#0ea5e9" />
    <link rel="canonical" href="https://bubblelink.app" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bubblelink.app" />
    <meta property="og:title" content="BubbleLink - Transform Your Bookmarks Into Beautiful Floating Bubbles" />
    <meta property="og:description" content="Save and organize your favorite websites as stunning floating bubbles in space. Click any bubble to instantly visit your bookmarked sites." />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
    <meta property="og:site_name" content="BubbleLink" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://bubblelink.app" />
    <meta property="twitter:title" content="BubbleLink - Transform Your Bookmarks Into Beautiful Floating Bubbles" />
    <meta property="twitter:description" content="Save and organize your favorite websites as stunning floating bubbles in space. Click any bubble to instantly visit your bookmarked sites." />
    <meta property="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon.ico" />

    <!-- Critical preconnects (only origins actually used at startup) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- DNS prefetch for runtime favicon fetches -->
    <link rel="dns-prefetch" href="//www.google.com" />
    <link rel="dns-prefetch" href="//s2.googleusercontent.com" />
    <!-- DNS prefetch for Google Favicon service used by bubbles -->
    <link rel="dns-prefetch" href="//t2.gstatic.com" />

    <!-- Fonts: non-render-blocking via media trick + font-display=swap -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"
      rel="stylesheet"
      media="print"
      fetchpriority="low"
      onload="this.media='all'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />
    </noscript>

    <!-- Inline critical above-the-fold styles: paint background instantly, no FOUC -->
    <style>
      *,*::before,*::after{box-sizing:border-box}
      html{-webkit-text-size-adjust:100%;text-size-adjust:100%;scroll-behavior:smooth}
      body{margin:0;background-color:hsl(210,40%,98%);color:hsl(215,25%,20%);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
      #root{min-height:100dvh;contain:layout style}
    </style>

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "BubbleLink",
      "description": "Transform your bookmarks into beautiful floating bubbles in space",
      "url": "https://bubblelink.app",
      "applicationCategory": "ProductivityApplication",
      "operatingSystem": "Web Browser",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx" fetchpriority="high"></script>
  </body>
</html>
